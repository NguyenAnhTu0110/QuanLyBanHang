<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#667eea" opacity="0.1" stroke="#667eea" stroke-width="2"/>
  
  <!-- SmartHub Logo - Hub symbol -->
  <g transform="translate(60, 60)">
    <!-- Central circle -->
    <circle cx="0" cy="0" r="8" fill="#667eea"/>
    
    <!-- Connected nodes -->
    <circle cx="20" cy="0" r="6" fill="#764ba2"/>
    <circle cx="-20" cy="0" r="6" fill="#764ba2"/>
    <circle cx="0" cy="20" r="6" fill="#764ba2"/>
    <circle cx="0" cy="-20" r="6" fill="#764ba2"/>
    
    <!-- Lines connecting nodes -->
    <line x1="0" y1="0" x2="16" y2="0" stroke="#667eea" stroke-width="2"/>
    <line x1="0" y1="0" x2="-16" y2="0" stroke="#667eea" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="16" stroke="#667eea" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-16" stroke="#667eea" stroke-width="2"/>
  </g>
  
  <!-- Text SMARTHUB -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#667eea">SMARTHUB</text>
</svg>
