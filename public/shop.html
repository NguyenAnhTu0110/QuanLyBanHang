<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Hub</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="shop">
    <main class="store-shell">
      <header class="store-topbar">
        <div>
          <div style="display: flex; align-items: center;">
            <img src="/img/logo_smarthub_shop.png" style="height: 50px; width: auto;" alt="Smart Hub Logo">
            <p class="eyebrow" style="padding: 0px;">Smart Hub</p>
          </div>
          <h2>Xin chào, <span data-auth-name>Đang tải...</span></h2>
          <small>Vai trò: <span data-auth-role>Người dùng</span></small>
        </div>

        <div class="button-row">
          <button class="btn btn-primary btn-sm" type="button" id="btnUpdateAccount">
            Cập nhật tài khoản
          </button>
          <button class="btn btn-secondary btn-sm" type="button" data-logout-button>
            Đăng xuất
          </button>
        </div>
      </header>
      <section class="store-card">
        <div class="panel-header" style="padding: 0 0 18px;">
          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
            <p class="eyebrow">Sản phẩm</p>
          </div>
        </div>

        <div id="shopProductsGrid" class="store-grid">
          <div class="store-empty">Đang tải sản phẩm...</div>
        </div>
      </section>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/shop.js"></script>
  </body>
</html>
