<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="register">
    <main class="auth-shell">
      <section class="auth-layout">
        <article class="auth-panel auth-welcome">
          <div class="welcome-content">
            <img src="/img/logo_smarthub.png" alt="SmartHub" class="logo" />
            <h1>TẠO TÀI KHOẢN</h1>
            <h2>SMARTHUB</h2>
            <p>Gia nhập hệ thống quản lý bán hàng hiện đại</p>
          </div>
        </article>

        <article class="auth-panel">
          <p class="eyebrow">Biểu mẫu đăng ký</p>
          <h2>Chào mừng gia nhập</h2>

          <form id="registerForm">
            <div class="form-grid">
              <div class="field full">
                <label for="registerUsername">Tên đăng nhập</label>
                <input
                  id="registerUsername"
                  name="username"
                  placeholder="Nhập tên đăng nhập (tối thiểu 3 ký tự)"
                  minlength="3"
                  required
                />
              </div>

              <div class="field full">
                <label for="registerEmail">Email</label>
                <input
                  id="registerEmail"
                  name="email"
                  type="email"
                  placeholder="Nhập email"
                  required
                />
              </div>

              <div class="field full">
                <label for="registerPhone">Số điện thoại</label>
                <input
                  id="registerPhone"
                  name="phone"
                  type="tel"
                  placeholder="Nhập số điện thoại (10 chữ số)"
                  pattern="[0-9]{10,11}"
                  required
                />
              </div>

              <div class="field full">
                <label for="registerPassword">Mật khẩu</label>
                <input
                  id="registerPassword"
                  name="password"
                  type="password"
                  placeholder="Nhập mật khẩu mạnh"
                  required
                />
                <small class="muted" id="passwordStrength"></small>
              </div>

              <div class="field full">
                <label for="registerPasswordConfirm">Xác nhận mật khẩu</label>
                <input
                  id="registerPasswordConfirm"
                  name="passwordConfirm"
                  type="password"
                  placeholder="Nhập lại mật khẩu"
                  required
                />
              </div>
            </div>

            <div class="button-row">
              <button class="btn btn-primary" type="submit" id="registerSubmitButton">
                Đăng ký
              </button>
              <a href="/login" class="btn btn-secondary">
                Hủy
              </a>
            </div>
          </form>

          <div id="registerErrors" class="auth-errors" style="display: none;"></div>

          <div class="auth-footer">
            <p>
              Đã có tài khoản? <a href="/login">Đăng nhập tại đây</a>
            </p>
          </div>
        </article>
      </section>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/register.js"></script>

    <style>
      .auth-welcome {
        background: #f5f5f5;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .welcome-content {
        text-align: center;
        padding: 30px 20px;
        max-height: 80vh;
        overflow-y: auto;
      }

      .welcome-content .logo {
        width: auto;
        height: 90px;
        margin-bottom: 16px;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
      }

      .welcome-content h1 {
        font-size: 1em;
        margin: 0 0 6px 0;
        font-weight: 600;
        color: #667eea;
      }

      .welcome-content h2 {
        font-size: 1.6em;
        margin: 0 0 10px 0;
        font-weight: 700;
        letter-spacing: 2px;
        color: #667eea;
      }

      .welcome-content p {
        font-size: 0.85em;
        color: #666;
        margin: 0;
      }

      .auth-footer {
        text-align: center;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #eee;
      }

      .auth-footer a {
        color: #0066cc;
        text-decoration: none;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .auth-panel {
        display: flex;
        flex-direction: column;
      }

      .auth-panel .eyebrow {
        font-size: 0.85em;
        margin-bottom: 4px; /* Giảm từ 8px */
      }

      .auth-panel h2 {
        font-size: 1.3em;
        margin: 0 0 10px 0; /* Giảm từ 14px */
      }

      .auth-panel form {
        max-height: 70vh;
        overflow-y: auto;
        padding-right: 8px;
      }
      
      /* Ép khoảng cách của grid nhỏ lại nếu có dùng display: grid */
      .auth-panel form .form-grid {
        gap: 8px; 
      }

      .auth-panel form .field {
        margin-bottom: 8px; /* Giảm từ 10px */
      }

      .auth-panel form .field label {
        font-size: 0.9em;
        margin-bottom: 2px; /* Giảm từ 4px */
        display: inline-block;
      }

      .auth-panel form .field input {
        font-size: 0.9em;
        padding: 8px 12px; /* Giảm nhẹ padding trên/dưới để form thon gọn hơn */
      }

      .auth-panel form .field small {
        font-size: 0.8em;
      }

      .button-row {
        margin-top: 8px; /* Giảm từ 12px */
      }

      .button-row .btn {
        font-size: 0.9em;
        padding: 8px 14px;
      }

      .auth-note {
        background: #f5f5f5;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 0.8em;
        margin: 12px 0;
        border-left: 3px solid #ffc107;
        text-align: left;
      }

      .auth-note strong {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9em;
      }

      .auth-note ul {
        margin: 0;
        padding: 0 0 0 18px;
        font-size: 0.85em;
      }

      .auth-note li {
        margin-bottom: 2px;
      }

      .auth-errors {
        background: #fee;
        border-left: 3px solid #d32f2f;
        padding: 10px 12px;
        border-radius: 6px;
        margin-top: 10px;
        color: #d32f2f;
        font-size: 0.85em;
      }

      .auth-errors ul {
        margin: 0;
        padding: 0 0 0 18px;
      }

      .auth-errors li {
        margin-bottom: 3px;
      }
    </style>
  </body>
</html>
