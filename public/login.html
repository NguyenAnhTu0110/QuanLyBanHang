<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập Hệ Thống</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="login">
    <main class="auth-shell">
      <section class="auth-layout">
        <article class="auth-panel auth-welcome">
          <div class="welcome-content">
            <img src="/img/logo_smarthub.svg" alt="SmartHub" class="logo" />
            <h1>CHÀO MỪNG ĐẾN VỚI</h1>
            <h2>SMARTHUB</h2>
            <p>Hệ thống quản lý bán hàng trực tuyến hiện đại</p>
          </div>
        </article>

        <article class="auth-panel">
          <p class="eyebrow">ĐĂNG NHẬP TÀI KHOẢN</p>

          <form id="loginForm">
            <div class="form-grid">
              <div class="field full">
                <label for="loginUsername">Tên đăng nhập</label>
                <input id="loginUsername" name="username" placeholder="Nhập tên đăng nhập" required />
              </div>

              <div class="field full">
                <label for="loginPassword">Mật khẩu</label>
                <input
                  id="loginPassword"
                  name="password"
                  type="password"
                  placeholder="Nhập mật khẩu"
                  required
                />
              </div>
            </div>

            <div class="button-row">
              <button class="btn btn-primary" type="submit" id="loginSubmitButton">
                Đăng nhập
              </button>
            </div>
          </form>
          <div class="auth-footer">
            <p>
              Chưa có tài khoản? <a href="/register">Đăng ký tại đây</a>
            </p>
          </div>
        </article>
      </section>
    </main>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/shared.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/login.js"></script>

    <style>
      .auth-welcome {
        background: #f5f5f5;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .welcome-content {
        text-align: center;
        padding: 40px 20px;
      }

      .welcome-content .logo {
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
      }

      .welcome-content h1 {
        font-size: 1.4em;
        margin: 0 0 8px 0;
        font-weight: 600;
        color: #667eea;
      }

      .welcome-content h2 {
        font-size: 2.5em;
        margin: 0 0 16px 0;
        font-weight: 700;
        letter-spacing: 2px;
        color: #667eea;
      }

      .welcome-content p {
        font-size: 0.95em;
        color: #666;
        margin: 0;
      }

      .auth-footer {
        text-align: center;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #eee;
      }

      .auth-footer a {
        color: #0066cc;
        text-decoration: none;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </body>
</html>
